<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web MP3 Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="player-container">
        <div class="top-controls">
            <button id="theme-btn" title="Mode Terang/Gelap"><i class="fas fa-moon"></i></button>
            <button id="wake-btn" title="Layar Tetap Menyala"><i class="fas fa-eye-slash"></i></button>
        </div>

        <div class="visual-container">
            <div class="vinyl-record" id="vinyl"></div>
        </div>

        <h2 id="song-title">Judul Lagu</h2>
        <p id="artist-name">Nama Artis</p>

        <div class="progress-wrapper">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" min="0" max="100">
            <span id="total-duration">0:00</span>
        </div>

        <div class="main-controls">
            <button id="prev-btn"><i class="fas fa-backward"></i></button>
            <button id="play-btn" class="play-pause"><i class="fas fa-play"></i></button>
            <button id="next-btn"><i class="fas fa-forward"></i></button>
        </div>

        <div class="lyrics-container">
            <button id="toggle-lyrics">Tampilkan Lirik <i class="fas fa-chevron-down"></i></button>
            <div id="lyrics-box" class="hidden">
                <pre id="lyrics-text">Memuat lirik...</pre>
            </div>
        </div>

        <audio id="audio"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
